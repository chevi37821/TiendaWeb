# ============================================================
# VERACODE PIPELINE SCAN — GitHub Actions
# Proyecto: TiendaWeb (.NET Core 3.1 / ASP.NET MVC C#)
# Usa Veracode CLI Autopackager — detecta .NET,
# ejecuta dotnet publish internamente y empaqueta
# los DLLs compilados para el análisis SAST
# ============================================================

name: Veracode Pipeline Scan DotNet

# ─────────────────────────────────────────────
# TRIGGERS — Cuándo se ejecuta este workflow
# ─────────────────────────────────────────────
on:
  push:
    branches: [ main, master ]        # Se dispara en cada push o commit
  pull_request:
    branches: [ main, master ]        # Se dispara en cada Pull Request
  workflow_dispatch:                  # Permite lanzarlo manualmente

# ─────────────────────────────────────────────
# PERMISOS
# ─────────────────────────────────────────────
permissions:
  contents: read
  pull-requests: read

# ─────────────────────────────────────────────
# FIX: Permite Node.js 20 en las actions
# ─────────────────────────────────────────────
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:

  # ══════════════════════════════════════════
  # JOB 1: AUTOPACKAGE
  # Veracode CLI detecta el proyecto .NET Core 3.1
  # ejecuta dotnet publish internamente y empaqueta
  # los DLLs compilados en un ZIP para Veracode
  # ══════════════════════════════════════════
  autopackage:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Clona el repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # Paso 2: Instala .NET Core 3.1
      # Requerido para que el autopackager pueda ejecutar
      # dotnet publish internamente al detectar el proyecto
      - name: Set up .NET Core 3.1
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '3.1.x'       # Versión del proyecto según Tienda.Ventas.csproj

      # Paso 3: Restaurar dependencias NuGet
      # El autopackager las necesita disponibles antes de compilar
      - name: Restaurar dependencias NuGet
        run: dotnet restore Tienda.sln

      # Paso 4: Instala el Veracode CLI
      - name: Instalar Veracode CLI
        run: |
          echo '[INFO] Descargando Veracode CLI...'
          curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          ./veracode version
          echo '[INFO] Veracode CLI instalado correctamente.'

      # Paso 5: Diagnóstico del proyecto
      # Detecta el toolchain .NET disponible
      # Genera o actualiza veracode.yml con los módulos
      # SIEMPRE ejecutar antes de veracode package
      - name: Veracode Package Discover
        run: |
          echo '[INFO] Detectando toolchains del proyecto...'
          ./veracode package discover
          echo '[INFO] Diagnóstico completado.'

      # Paso 6: Empaqueta el proyecto automáticamente
      # El autopackager detecta el .sln/.csproj,
      # ejecuta dotnet publish y empaqueta los DLLs
      # Genera: veracode-auto-pack-TiendaWeb-dotnet.zip
      - name: Veracode Autopackage
        run: |
          echo '[INFO] Empaquetando proyecto .NET...'
          ./veracode package \
            --source . \
            --trust \
            --output ./dist \
            --verbose
          echo '[INFO] Artefactos generados:'
          ls -la ./dist/

      # Paso 7: Sube el artefacto para el job de scan
      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: tiendaweb-artifact
          path: ./dist/*.zip

  # ══════════════════════════════════════════
  # JOB 2: VERACODE PIPELINE SCAN
  # Descarga el ZIP con los DLLs compilados
  # y lo envía a Veracode para análisis SAST
  # ══════════════════════════════════════════
  veracode-scan:
    needs: autopackage                # Espera que autopackage termine
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Descarga el artefacto del autopackager
      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: tiendaweb-artifact

      # Paso 2: Lista archivos descargados
      - name: Listar archivos descargados
        run: |
          echo '[INFO] Archivos disponibles para escanear:'
          ls -la

      # Paso 3: Instala Java para ejecutar pipeline-scan.jar
      # Cada job corre en runner limpio — Java debe reinstalarse
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Paso 4: Ejecuta el Pipeline Scan de Veracode
      # Para .NET el artefacto es un ZIP con los DLLs compilados
      # --fail_on_severity: bloquea si encuentra Very High o High
      # Quitar esa línea para modo pasivo (solo reporta)
      - name: Veracode Pipeline Scan
        env:
          VID: ${{ secrets.VID }}     # API ID de Veracode
          VKEY: ${{ secrets.VKEY }}   # API Secret Key de Veracode
        run: |
          echo '[INFO] Descargando Pipeline Scanner...'
          curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          unzip pipeline-scan-LATEST.zip

          echo '[INFO] Archivos ZIP disponibles:'
          ls -la *.zip

          # Detectar el ZIP del autopackager
          # Excluye pipeline-scan-LATEST.zip
          ZIP_FILE=$(ls *.zip | grep -v "pipeline-scan" | head -1)

          # Validar que se encontró el artefacto
          if [ -z "$ZIP_FILE" ]; then
            echo '[ERROR] No se encontró artefacto ZIP para escanear'
            echo '[ERROR] Verificar que el autopackager generó el artefacto .NET'
            exit 1
          fi

          echo "[INFO] Artefacto a escanear: $ZIP_FILE"

          echo '[INFO] Ejecutando Pipeline Scan .NET...'
          java -jar pipeline-scan.jar \
            -vid "$VID" \
            -vkey "$VKEY" \
            --file "$ZIP_FILE" \
            --project_name "$GITHUB_REPOSITORY" \
            --project_url "https://github.com/$GITHUB_REPOSITORY" \
            --fail_on_severity "Very High, High" \
            --json_output_file results.json \
            --filtered_json_output_file filtered_results.json

          echo '[INFO] Verificando archivos JSON generados...'
          ls -la *.json || echo '[WARN] No se generaron archivos JSON'
          echo '[INFO] Pipeline Scan completado.'

      # Paso 5: Guarda resultados como artefacto descargable
      # if: always() garantiza guardado aunque el scan falle
      - name: Guardar resultados del scan
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: veracode-scan-results-dotnet
          path: |
            results.json
            filtered_results.json
