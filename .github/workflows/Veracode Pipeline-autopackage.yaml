# ============================================================
# VERACODE PIPELINE SCAN — GitHub Actions
# Proyecto: TiendaWeb (.NET Core 3.1 / ASP.NET MVC C#)
# Compilación manual con dotnet publish + autopackager
# para garantizar que los DLLs estén disponibles
# ============================================================

name: Veracode Pipeline Scan DotNet

# ─────────────────────────────────────────────
# TRIGGERS — Cuándo se ejecuta este workflow
# ─────────────────────────────────────────────
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# ─────────────────────────────────────────────
# PERMISOS
# ─────────────────────────────────────────────
permissions:
  contents: read
  pull-requests: read

# ─────────────────────────────────────────────
# FIX: Permite Node.js 20 en las actions
# ─────────────────────────────────────────────
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:

  # ══════════════════════════════════════════
  # JOB 1: BUILD + AUTOPACKAGE
  # Compila el proyecto .NET Core 3.1 manualmente
  # con dotnet publish para garantizar los DLLs
  # Luego el autopackager los empaqueta para Veracode
  # ══════════════════════════════════════════
  autopackage:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Clona el repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # Paso 2: Instala .NET Core 3.1
      # .NET Core 3.1 llegó a EOL en dic 2022
      # Se instala explícitamente para garantizar disponibilidad
      - name: Set up .NET Core 3.1
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '3.1.x'

      # Paso 3: Restaurar dependencias NuGet
      # Descarga todos los paquetes referenciados en el .csproj
      # Requerido antes de compilar
      - name: Restaurar dependencias NuGet
        run: |
          echo '[INFO] Restaurando dependencias NuGet...'
          dotnet restore Tienda.sln
          echo '[INFO] Restauración completada.'

      # Paso 4: Compilar y publicar el proyecto
      # dotnet publish compila y genera los DLLs en ./publish/
      # -c Release: compilación optimizada para producción
      # -o ./publish: carpeta de salida con todos los binarios
      # --no-restore: evita restaurar de nuevo (ya se hizo en paso 3)
      # OBLIGATORIO para .NET — el autopackager necesita los DLLs
      - name: Build y Publish .NET
        run: |
          echo '[INFO] Compilando proyecto .NET Core 3.1...'
          dotnet publish Tienda.Ventas/Tienda.Ventas.csproj \
            -c Release \
            -o ./publish \
            --no-restore
          echo '[INFO] Archivos publicados en ./publish:'
          ls -la ./publish/

      # Paso 5: Instala el Veracode CLI
      - name: Instalar Veracode CLI
        run: |
          echo '[INFO] Descargando Veracode CLI...'
          curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          ./veracode version
          echo '[INFO] Veracode CLI instalado correctamente.'

      # Paso 6: Diagnóstico del proyecto
      # Con los DLLs ya compilados en ./publish/
      # el autopackager debe detectar correctamente el proyecto .NET
      - name: Veracode Package Discover
        run: |
          echo '[INFO] Detectando toolchains del proyecto...'
          ./veracode package discover
          echo '[INFO] Diagnóstico completado.'

      # Paso 7: Empaqueta el proyecto con el autopackager
      # Con los DLLs en ./publish/ el autopackager genera:
      # veracode-auto-pack-TiendaWeb-dotnet.zip
      # que contiene los assemblies compilados listos para Veracode
      - name: Veracode Autopackage
        run: |
          echo '[INFO] Empaquetando proyecto .NET...'
          ./veracode package \
            --source . \
            --trust \
            --output ./dist \
            --verbose
          echo '[INFO] Artefactos generados:'
          ls -la ./dist/

      # Paso 8: Sube el artefacto para el job de scan
      # Si el autopackager generó un .zip de DLLs lo sube
      # Si no, sube el contenido de ./publish como fallback
      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: tiendaweb-artifact
          path: |
            ./dist/*.zip
            ./publish/*.dll

  # ══════════════════════════════════════════
  # JOB 2: VERACODE PIPELINE SCAN
  # Descarga el artefacto y lo envía a Veracode
  # para análisis estático (SAST) de .NET
  # ══════════════════════════════════════════
  veracode-scan:
    needs: autopackage
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Descarga el artefacto
      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: tiendaweb-artifact

      # Paso 2: Lista archivos y prepara el artefacto
      # Si vienen DLLs sueltos los empaqueta en un ZIP
      # para que el Pipeline Scanner pueda procesarlos
      - name: Preparar artefacto para scan
        run: |
          echo '[INFO] Archivos disponibles:'
          ls -la

          # Si existe un ZIP del autopackager usarlo directamente
          if ls *.zip 1>/dev/null 2>&1; then
            echo '[INFO] ZIP del autopackager encontrado.'
            ls -la *.zip

          # Si solo hay DLLs sueltos empaquetarlos en un ZIP
          elif ls *.dll 1>/dev/null 2>&1; then
            echo '[INFO] DLLs encontrados — empaquetando en ZIP para Veracode...'
            zip -r tiendaweb-dotnet.zip *.dll *.pdb 2>/dev/null || true
            echo '[INFO] ZIP generado:'
            ls -la tiendaweb-dotnet.zip

          else
            echo '[ERROR] No se encontró artefacto para escanear'
            exit 1
          fi

      # Paso 3: Instala Java para ejecutar pipeline-scan.jar
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Paso 4: Ejecuta el Pipeline Scan de Veracode
      # Para .NET el artefacto es un ZIP con DLLs compilados
      # --fail_on_severity: bloquea si encuentra Very High o High
      # Quitar esa línea para modo pasivo (solo reporta, no bloquea)
      - name: Veracode Pipeline Scan
        env:
          VID: ${{ secrets.VID }}     # API ID de Veracode
          VKEY: ${{ secrets.VKEY }}   # API Secret Key de Veracode
        run: |
          echo '[INFO] Descargando Pipeline Scanner...'
          curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          unzip pipeline-scan-LATEST.zip

          echo '[INFO] Archivos disponibles para escanear:'
          ls -la

          # Detectar el ZIP del artefacto
          # Excluye pipeline-scan-LATEST.zip
          ZIP_FILE=$(ls *.zip | grep -v "pipeline-scan" | head -1)

          # Validar que se encontró el artefacto
          if [ -z "$ZIP_FILE" ]; then
            echo '[ERROR] No se encontró artefacto ZIP para escanear'
            exit 1
          fi

          echo "[INFO] Artefacto a escanear: $ZIP_FILE"

          echo '[INFO] Ejecutando Pipeline Scan .NET...'
          java -jar pipeline-scan.jar \
            -vid "$VID" \
            -vkey "$VKEY" \
            --file "$ZIP_FILE" \
            --project_name "$GITHUB_REPOSITORY" \
            --project_url "https://github.com/$GITHUB_REPOSITORY" \
            --fail_on_severity "Very High, High" \
            --json_output_file results.json \
            --filtered_json_output_file filtered_results.json

          echo '[INFO] Verificando archivos JSON generados...'
          ls -la *.json || echo '[WARN] No se generaron archivos JSON'
          echo '[INFO] Pipeline Scan .NET completado.'

          # ─────────────────────────────────────────
          # CÓDIGOS DE SALIDA (EXIT CODES):
          # 0  → Sin findings bloqueantes → pipeline continúa ✅
          # 16 → N findings bloqueantes → pipeline falla ❌
          # 1  → Error de configuración o autenticación ❌
          # ─────────────────────────────────────────

      # Paso 5: Guarda resultados como artefacto descargable
      # if: always() garantiza guardado aunque el scan falle
      - name: Guardar resultados del scan
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: veracode-scan-results-dotnet
          path: |
            results.json
            filtered_results.json
